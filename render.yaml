services:
  - type: web
    name: finishvision-api
    runtime: docker
    region: oregon
    plan: free
    dockerfile: ./apps/backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finishvision-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: CORS_ORIGIN
        value: "*"
      - key: S3_BUCKET
        value: finishvision-uploads
      - key: S3_REGION
        value: us-east-1
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: finishvision-db
    databaseName: finishvision
    user: finishvision_user
    region: oregon
    plan: free
